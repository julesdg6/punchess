<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Punchess Arena</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <h1>Punchess</h1>
  <div id="info">Use a game ID to watch a live game.</div>
  <div>
    <input id="gameId" placeholder="game id" />
    <button id="watchBtn">Watch</button>
  </div>

  <div class="grid">
    <div>
      <h3>Board</h3>
      <table id="board"></table>
    </div>
    <div>
      <h3>Game Info</h3>
      <pre id="status"></pre>
      <h3>Moves</h3>
      <pre id="moves"></pre>
      <h3>Reports</h3>
      <ul id="reports"></ul>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
